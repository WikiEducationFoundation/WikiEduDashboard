          틀을 기준으로 문서를 추적할 수 있습니다. (예: 위키프로젝트 틀)'
        petscan: PetScan
        petscan_short_desc: PetScan은 분류, 틀, 위키링크 등 다양한 기준에 따라 위키 문서를 검색할 수 있는 도구입니다.
          PetScan 쿼리 ID를 사용하여 대시보드에서 추적할 문서 세트를 구성할 수 있습니다.
        pagepile: PagePile
        pagepile_short_desc: PagePile은 시간이 지나도 변하지 않고 고유 ID로 식별되는 문서 목록을 만들 수 있는 도구입니다.
        templates_desc: 틀은 위키 문서에서 매우 다양한 용도로 사용되지만, 특정 주제에 특화된 틀도 있습니다. 탐색 틀, 위키프로젝트
          틀, 주제별 정보상자 틀은 문서 범위 집중 프로그램을 구성할 때 특히 유용합니다.
        pagepile_desc: PagePile은 위키미디어 클라우드에서 사용할 수 있는 도구입니다. 사용자는 PagePile을 이용하여
          여러 위키 문서를 하나의 묶음(pile)으로 모아 정리할 수 있습니다. 이렇게 만들어진 묶음은 다른 사용자와 쉽게 공유할 수 있어
          협업과 정보 공유가 가능합니다. PetScan과는 달리, PagePile에 포함된 문서는 분류, 틀 또는 해당 문서들을 만드는 데
          사용된 다른 데이터가 변경되더라도 시간이 지나도 변하지 않습니다.
        petscan_desc: PetScan은 다양한 기준과 데이터 소스를 기반으로 위키 문서 집합을 쿼리하는 강력하지만 복잡한 도구입니다.
          PetScan을 직접 사용하여 추적하려는 문서 집합에 대한 쿼리를 생성할 수 있으며, 이를 통해 쿼리를 매우 정확하게 지정할 수
          있는 모든 옵션을 활용할 수 있습니다. 또는 대시보드에서 가장 일반적인 옵션 중 일부를 사용하여 PetScan 쿼리를 직접 생성할
          수도 있습니다. PetScan은 쿼리 매개변수를 저장하고 해당 쿼리에 ID를 부여합니다. 쿼리 결과는 시간이 지남에 따라 변경될
          수 있으며, 예를 들어 쿼리에 포함된 분류에 새 문서가 추가될 때 변경될 수 있습니다. 대시보드는 지정된 ID에 대한 쿼리 결과를
          주기적으로 새로 고치고 PetScan에서 생성된 최신 문서 집합을 기반으로 통계를 업데이트합니다.
