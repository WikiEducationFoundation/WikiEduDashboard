          0)에서는 해당 분류에 직접 속한 문서만 추적됩니다. 하위 분류에 속한 문서까지 추적하려면 깊이 값을 최대 3까지 높일 수 있습니다.
          추적하려는 하위 분류가 분류 내용과 일치하는지 먼저 분류를 확인해 보세요.
