  suggestions:
    editing: 편집 제안
    suggestion_docs:
      fa: 새 정보가 제공되지 않는 한 내용의 추가 보강은 필요하지 않습니다. 산문 품질의 추가 개선은 종종 가능합니다.
      a: 문서를 다듬기 위해서는 전문가의 지식이 필요할 수 있으며, 문체상의 문제점을 해결해야 할 수도 있습니다. 동료 평가를 받는 것이 도움이
        될 수 있습니다.
      ga: 주제 및 스타일 전문가의 편집이 도움이 될 수 있으며, 유사한 주제에 대한 기존 추천 문서와 비교하여 내용이 부족하거나 누락된 부분을
        파악할 수 있습니다.
      bplus: 전문가의 의견을 통해 부족한 부분을 파악하고, 삽화, 역사적 배경, 추가 참고 자료를 제공하여 내용을 개선할 수 있습니다.
        동료 평가를 거치거나 우수 문서로 추천하는 것을 고려해 보세요. 아직 위키에 완전히 등재되지 않은 문서라면 지금이 바로 적기입니다.
      b: 내용 및 형식과 관련하여 몇 가지 사항을 검토해야 합니다. 전문가의 도움이 필요할 수 있습니다. 가능하다면 보충 자료를 첨부하는 것을
        고려해야 하며, 문서가 스타일 매뉴얼 및 관련 스타일 지침을 전반적으로 준수하는지 확인해야 합니다.
      c: 내용의 공백을 메우고 정리 문제를 해결하기 위해서는 상당한 편집 작업이 필요합니다.
      start: 신뢰할 수 있는 출처를 제시하는 것이 최우선 과제이며, 내용과 구성 면에서도 상당한 개선이 필요합니다. 문법, 철자, 문체,
        전문 용어 사용 또한 개선해야 합니다.
      stub: 편집이나 추가 자료는 모두 도움이 될 수 있습니다. 의미 있는 내용을 제공하는 것이 최우선 과제입니다. 미완성 문서를 완성형
        문서로 발전시키는 가장 좋은 방법은 해당 주제가 중요한 이유를 근거와 함께 제시하는 것입니다.
      fl: 새로운 정보가 입수되지 않는 한 추가적인 내용 추가는 필요하지 않습니다.
      list: 목록은 위키백과 문서에 대한 활성 링크 목록이어야 하며, 적절한 이름과 체계적인 구조를 가져야 합니다.
      future: 추가된 자료는 추측에 불과할 수 있으므로 출처를 신중하게 확인해야 합니다.
      disambig: 같은 이름의 새 문서가 생성될 때마다 내용을 추가해야 합니다. 이러한 문서의 이름 지정에 특히 주의하세요. 대부분의 경우는
        제목에 "(동음이의)"를 추가할 필요가 없습니다.
      '?': 제안을 사용할 수 없습니다 - 이 글은 평가되지 않았거나 평가를 위해 제안을 사용할 수 없습니다.
      does_not_exist: 이 글은 위키백과에 존재하지 않습니다.
