  suggestions:
    editing: Návrhy na úpravu
    suggestion_docs:
      fa: Žiadne ďalšie doplnenie obsahu by nemalo byť potrebné, pokiaľ nebudú k dispozícii
        nové informácie; často sú možné ďalšie vylepšenia kvality textu.
      a: Na doladenie článku môžu byť potrebné odborné znalosti a možno bude treba
        vyriešiť štylistické problémy. Môže pomôcť partnerské hodnotenie.
      ga: Užitočná je určitá úprava od odborníkov na tému a štýl; porovnanie s existujúcim
        najlepším článkom na podobnú tému môže poukázať na oblasti, kde je obsah slabý
        alebo chýba.
      bplus: Môže sa vylepšiť podnetmi od odborníkov na posúdenie, kde stále chýba
        pokrytie, a tiež ilustráciami, historickým pozadím a ďalšími referenciami.
        Zvážte partnerské hodnotenie alebo nomináciu na status dobrého článku. Ak
        článok ešte nie je úplne wikifikovaný, teraz je ten správny čas.
      b: Je potrebné vyriešiť niekoľko aspektov obsahu a štýlu. Môžu byť potrebné
        odborné znalosti. Ak je to praktické, malo by sa zvážiť zahrnutie podporných
        materiálov a článok by sa mal skontrolovať na všeobecný súlad s Manuálom štýlu
        a súvisiacimi štylistickými pokynmi.
      c: Na uzavretie medzier v obsahu a vyriešenie problémov s vyčistením je potrebná
        značná úprava.
      start: Najprv by malo prísť uvedenie odkazov na spoľahlivé zdroje; článok tiež
        potrebuje podstatné vylepšenie obsahu a usporiadania. Zlepšite tiež gramatiku,
        pravopis, štýl písania a používanie žargónu.
      stub: Akákoľvek úprava alebo doplnkový materiál môže byť užitočný. Prioritou
        by malo byť poskytnutie zmysluplného obsahu. Najlepším riešením, ako posunúť
        článok triedy „pahýľ“ na článok triedy „začiatok“, je pridať podložené dôvody,
        prečo je téma významná.
      fl: Žiadne ďalšie doplnenie obsahu by nemalo byť potrebné, pokiaľ nebudú k dispozícii
        nové informácie.
      list: Zoznamy by mali byť zoznamy aktívnych odkazov na články Wikipédie, vhodne
        pomenované a usporiadané.
      future: Pridaný materiál môže byť špekulatívny a mal by byť starostlivo podložený
        zdrojmi.
      disambig: Doplnky by sa mali pridávať, keď sa vytvárajú nové články s daným
        názvom. Venujte veľkú pozornosť správnemu pomenovaniu takýchto stránok, keďže
        často nepotrebujú za názvom pridané „(rozlišovacia stránka)“.
      '?': Návrhy nie sú dostupné – článok buď nie je ohodnotený, alebo pre dané hodnotenie
        nie sú dostupné návrhy.
      does_not_exist: Tento článok na Wikipédii neexistuje.
