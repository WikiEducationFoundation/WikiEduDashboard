      start_date: Začiatok sledovania aktivity
      scoping_methods:
        scoping_methods: Metódy vymedzenia
        configure: Nakonfigurovať metódy vymedzenia
        about: |-
          Pri programe vymedzenom článkami bude nástenka sledovať iba úpravy článkov, pre ktoré ste ju nakonfigurovali. Po vytvorení vašej stránky môžete pridávať jednotlivé články na sledovanie tak, že články priradíte jednotlivým redaktorom alebo ich pridáte ako dostupné články. Pri väčších skupinách článkov môžete použiť ktorýkoľvek z týchto nástrojov na definovanie článkov, ktoré chcete sledovať.
          Vyberte metódy vymedzenia, ktoré chcete teraz nakonfigurovať. Metódy vymedzenia môžete pridať aj neskôr na karte Články.
        categories: Kategórie
        categories_short_desc: Funkcia kategórií na wiki sa používa na zoskupovanie
          súvisiacich článkov. Názov kategórie môžete použiť na to, aby ste nástenke
          povedali, nech sleduje všetky články v tejto kategórii.
        categories_desc: |-
          Sledovanie kategórie znamená, že nástenka bude počítať úpravy ľubovoľných článkov v tejto kategórii. Predvolene (hĺbka 0) sa budú sledovať len články, ktoré sú priamo v tejto kategórii.
          Hodnotu hĺbky môžete zvýšiť (maximálne na 3), ak chcete zahrnúť články, ktoré sú v podkategóriách tejto kategórie. Najprv si kategóriu prezrite, aby ste sa uistili, že podkategórie zodpovedajú tomu, čo chcete sledovať.
        templates: Šablóny
        templates_short_desc: Články môžete sledovať na základe šablóny, ktorú obsahujú,
          čo funguje bez ohľadu na to, či sa šablóna používa v samotnom článku alebo
          na zodpovedajúcej diskusnej stránke — ako napríklad šablóny WikiProjektov.
        petscan: PetScan
        petscan_short_desc: PetScan je nástroj, ktorý vám umožňuje dopytovať wiki
          stránky na základe širokej škály kritérií — vrátane kategórií, šablón, wikiodkazov
          a mnohého ďalšieho. PetScan ID dotazu môžete použiť na nakonfigurovanie
          sady článkov na sledovanie na nástenke.
        pagepile: PagePile
        pagepile_short_desc: PagePile je nástroj, ktorý vám umožňuje vytvoriť zoznam
          stránok, ktorý sa časom nemení a je identifikovaný jedinečným ID.
        templates_desc: Šablóny sa na wiki stránkach používajú na širokú škálu účelov,
          no niektoré sú špecifické pre danú tému. Navigačné šablóny, šablóny WikiProjektov
          a tematické infoboxové šablóny sú obzvlášť užitočné pri používaní šablóny
          na nakonfigurovanie programu vymedzeného článkami.
        pagepile_desc: |-
          PagePile je nástroj vo Wikimedia Cloud. Umožňuje používateľom zhromaždiť a usporiadať skupinu wiki stránok do jedného balíka nazývaného „pile“ (kopa). Tieto kopy sa potom dajú ľahko zdieľať s ostatnými, čo umožňuje spoločnú prácu a zdieľanie informácií.
          Na rozdiel od PetScan sa články v kope časom nemenia, aj keď sa zmenili kategórie, šablóny alebo iné údaje použité na vytvorenie tejto skupiny článkov.
        petscan_desc: |-
          PetScan je výkonný, no zložitý nástroj na dopytovanie skupiny wiki stránok na základe širokej škály kritérií a zdrojov údajov. PetScan môžete použiť priamo na vytvorenie dotazu pre skupinu článkov, ktoré chcete sledovať, čo vám dáva prístup k úplnej sade možností na veľmi presné zacielenie dotazu. Prípadne môžete vytvoriť PetScan dotaz z niektorých najbežnejších možností priamo z nástenky.
          PetScan uloží parametre dotazu a poskytne ID pre tento dotaz. Výsledky tohto dotazu sa môžu časom meniť, napríklad keď sa do kategórie, ktorú dotaz zahŕňa, pridajú nové články. Nástenka bude pravidelne obnovovať výsledky dotazu pre dané ID a aktualizovať svoje štatistiky na základe najnovšej sady článkov, ktorú PetScan vytvorí.
        petscan_create_psid: Vytvorte PetScan ID pomocou oficiálneho nástroja PetScan
        pagepile_create_id: Vytvorte PagePile pomocou oficiálneho nástroja PagePile
        categories_include_OR: Budú sa sledovať články obsahujúce KTORÚKOĽVEK z týchto
          kategórií
        templates_include_OR: Budú sa sledovať články obsahujúce KTORÚKOĽVEK z týchto
          šablón
        start_typing_to_search: Začnite písať pre vyhľadávanie
