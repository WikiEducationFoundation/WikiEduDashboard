      create_short: Vytvoriť program
      end_date: Koniec sledovania aktivity
      find: Nájsť program
      intro: Názov programu a inštitúcia tvoria URL adresu programu. Domovská wiki
        je hlavná wiki, na ktorej budú účastníci pracovať, a úpravy na tejto wiki
        sa budú predvolene sledovať. Ak sa váš program rozprestiera cez viacero jazykov
        alebo projektov, príspevky sa budú sledovať aj pre každú wiki, ktorá bola
        výslovne pridaná do „sledovaných wiki“. Kliknutím na „Vytvoriť môj program!“
        začnete budovať stránku svojho wiki programu.
      new_or_clone: Vytvorte nový program teraz, alebo použite možnosť „klonovať“
