  suggestions:
    editing: Suggesties bewerken
    suggestion_docs:
      fa: Verdere inhoudelijke toevoegingen zouden niet nodig moeten zijn tenzij er
        nieuwe informatie beschikbaar komt; verdere verbeteringen van de tekstkwaliteit
        zijn vaak mogelijk.
      a: Voor het bijschaven van de pagina is wellicht specialistische kennis nodig
        en moeten mogelijk stijlproblemen worden opgelost. Peer review kan daarbij
        nuttig zijn.
      ga: Sommige bewerkingen door vak- en stijlexperts zijn nuttig; Vergelijking
        met een bestaande aanbevolen pagina over een soortgelijk onderwerp kan de
        aandacht vestigen op gebieden waar de inhoud zwak is of ontbreekt.
      bplus: De pagina kan mogelijk verbeterd worden door hulp van experts om te beoordelen
        waar de informatie nog ontbreekt, en ook door illustraties, historische achtergrondinformatie
        en aanvullende referenties. Overweeg peer review of nominatie voor de status
        van 'goede pagina'. Als de pagina nog niet volledig is gewikificeerd, is dit
        het moment om dat te doen.
      b: Enkele aspecten van inhoud en stijl moeten worden aangepakt. Deskundige kennis
        kan nodig zijn. Het opnemen van ondersteunend materiaal moet worden overwogen
        indien praktisch, en de pagina moet worden gecontroleerd op algemene naleving
        van de Stijlgids en gerelateerde stijlrichtlijnen.
      c: Aanzienlijke bewerking is nodig om hiaten in de inhoud te dichten en opruimproblemen
        op te lossen.
      start: Het verstrekken van referenties naar betrouwbare bronnen moet voorop
        staan; de pagina heeft ook aanzienlijke verbetering nodig in inhoud en organisatie.
        Verbeter ook de grammatica, spelling, schrijfstijl en het jargongebruik.
      stub: Elke bewerking of aanvullend materiaal kan nuttig zijn. Het bieden van
        zinvolle inhoud moet prioriteit hebben. De beste oplossing voor een stub-pagina
        om op te klimmen naar een startpagina is het toevoegen van gerefereerde redenen
        waarom het onderwerp significant is.
      fl: Verdere inhoudelijke toevoegingen zouden niet nodig moeten zijn tenzij er
        nieuwe informatie beschikbaar komt.
      list: Lijsten moeten lijsten zijn van werkende koppelingen naar Wikipedia-pagina's,
        op de juiste manier benoemd en georganiseerd.
      future: Toegevoegd materiaal kan speculatie zijn en moet zorgvuldig worden onderbouwd
        met bronnen.
      disambig: Toevoegingen moeten worden gemaakt wanneer nieuwe pagina's met die
        naam worden aangemaakt. Let goed op de juiste naamgeving van dergelijke pagina's,
        aangezien ze vaak geen "(doorverwijspagina)" aan de titel hoeven te hebben.
      '?': Suggesties niet beschikbaar - De pagina is niet beoordeeld of er zijn geen
        suggesties beschikbaar voor de beoordeling.
      does_not_exist: Deze pagina bestaat niet op Wikipedia.
