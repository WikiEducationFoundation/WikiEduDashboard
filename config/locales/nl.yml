    wp10: Structurele volledigheid
    wp10_doc: De score 'Structurele volledigheid' geeft aan hoe goed een pagina voldoet
      aan de structuur van een volwaardige Wikipedia-pagina, gebaseerd op de verouderde
      (circa 2015) machine learning-gebaseerde dienst "Objective Revision Evaluation
      Service." Deze scores worden berekend op basis van de lengte van een pagina,
      het aantal verwijzingen en wikikoppelingen, en andere basiskenmerken van de
      tekst. Een hoge score geeft meestal aan dat een pagina voldoet aan de Wikipedia-conventies
      voor de structuur van een goede pagina, maar houdt geen rekening met de inhoud
      zelf.
