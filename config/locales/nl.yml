      scoping_methods:
        scoping_methods: Afbakeningsmethoden
        configure: Afbakeningsmethoden configureren
        about: |-
          Voor een paginagericht programma volgt het dashboard alleen bewerkingen aan de pagina's waarvoor u het hebt geconfigureerd. Nadat uw pagina is aangemaakt, kunt u individuele pagina's toevoegen om te volgen door pagina's toe te wijzen aan individuele bewerkers of door ze toe te voegen als beschikbare pagina's. Voor grotere sets pagina's kunt u elk van deze hulpmiddelen gebruiken om pagina's te definiu00ebren die u wilt volgen.
          Selecteer de afbakeningsmethoden die u nu wilt configureren. U kunt later ook afbakeningsmethoden toevoegen via het tabblad Pagina's.
        categories: Categorieën
        categories_short_desc: De categoriefunctie op een wiki wordt gebruikt om gerelateerde
          pagina's te verzamelen. U kunt de naam van de categorie gebruiken om het
          dashboard te vertellen alle pagina's in die categorie te volgen.
        categories_desc: |-
          Het volgen van een categorie betekent dat het dashboard bewerkingen telt aan alle pagina's in die categorie. Standaard (diepte 0) worden alleen de pagina's gevolgd die direct in die categorie staan.
          U kunt de dieptewaarde verhogen (tot maximaal 3) als u pagina's wilt opnemen die in subcategorieu00ebn van die categorie staan. Blader eerst door de categorie om er zeker van te zijn dat de subcategorieu00ebn overeenkomen met wat u wilt volgen.
        templates: Sjablonen
        templates_short_desc: U kunt pagina's volgen op basis van een sjabloon dat
          ze bevatten, wat werkt ongeacht of het sjabloon op de pagina zelf wordt
          gebruikt of op de bijbehorende overlegpagina, zoals WikiProject-sjablonen.
        petscan: PetScan
        petscan_short_desc: PetScan is een hulpmiddel waarmee u wikipagina's kunt
          opvragen op basis van een breed scala aan criteria, waaronder categorieën,
          sjablonen, wikikoppelingen en nog veel meer. U kunt een PetScan-query-ID
          gebruiken om een set pagina's te configureren om te volgen op het dashboard.
        pagepile: PagePile
        pagepile_short_desc: PagePile is een hulpmiddel waarmee u een lijst met pagina's
          kunt maken die niet verandert in de loop van de tijd en wordt geïfdentificeerd
          door een unieke ID.
        templates_desc: Sjablonen worden voor uiteenlopende doeleinden gebruikt op
          wikipagina's, maar sommige zijn specifiek voor een onderwerp. Navigatiesjablonen,
          WikiProject-sjablonen en onderwerpspecifieke infoboxsjablonen zijn bijzonder
          nuttig bij het gebruik van een sjabloon om een paginagericht programma te
          configureren.
        pagepile_desc: |-
          PagePile is een hulpmiddel op Wikimedia Cloud. Het stelt gebruikers in staat om een groep wikipagina's te verzamelen en te organiseren in een enkele bundel die een "pile" wordt genoemd. Deze piles kunnen vervolgens eenvoudig met anderen worden gedeeld, wat samenwerking en het delen van informatie mogelijk maakt.
          In tegenstelling tot PetScan wijzigen de pagina's in een pile niet in de loop van de tijd, zelfs niet wanneer categorieën, sjablonen of andere gegevens die zijn gebruikt om die set pagina's te maken, zijn gewijzigd.
        petscan_desc: |-
          PetScan is een krachtig maar complex hulpmiddel voor het opvragen van een set wikipagina's op basis van een breed scala aan criteria en gegevensbronnen. U kunt PetScan rechtstreeks gebruiken om de zoekopdracht te maken voor een set pagina's die u wilt volgen, wat u toegang geeft tot de volledige set opties om uw zoekopdracht zeer nauwkeurig te richten. U kunt ook een PetScan-zoekopdracht maken vanuit enkele van de meest gebruikte opties rechtstreeks vanuit het dashboard.
          PetScan slaat de zoekopdrachtparameters op en biedt een ID voor die zoekopdracht. De resultaten van die zoekopdracht kunnen in de loop van de tijd wijzigen, bijvoorbeeld wanneer nieuwe pagina's worden toegevoegd aan een categorie die de zoekopdracht bevat. Het dashboard vernieuwt periodiek de zoekresultaten voor een bepaalde ID en werkt de statistieken bij op basis van de nieuwste set pagina's die PetScan produceert.
        petscan_create_psid: Een PetScan-ID aanmaken met het officiu00eble PetScan-hulpmiddel
        pagepile_create_id: Een PagePile aanmaken met het officiu00eble PagePile-hulpmiddel
        categories_include_OR: Pagina's die een van deze categorieu00ebn bevatten,
          worden gevolgd
        templates_include_OR: Pagina's die een van deze sjablonen bevatten, worden
          gevolgd
        start_typing_to_search: Begin met typen om te zoeken
