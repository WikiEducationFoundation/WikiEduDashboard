      scoping_methods:
        scoping_methods: Modhanna Scóipeála
        configure: Cumraigh Modhanna Scóipeála
        about: |-
          I gcás Clár Raon Feidhme Airteagal, ní dhéanfaidh an Painéal ach eagarthóireachtaí ar na hairteagail a chumraigh tú dóibh a rianú. Tar éis do leathanach a chruthú, is féidir leat ailt aonair a chur leis chun rianú a dhéanamh ar shannadh alt d’eagarthóirí aonair nó trína gcur leis mar Ailt atá ar Fáil. I gcás tacair níos mó alt, is féidir leat aon cheann de na huirlisí seo a úsáid chun ailt is mian leat a rianú a shainiú.
          Roghnaigh aon mhodhanna raoin feidhme is mian leat a chumrú anois. Is féidir leat modhanna raoin feidhme a chur leis níos déanaí ón táb Ailt freisin.
        categories: Catagóirí
        categories_short_desc: Úsáidtear an ghné Catagóire ar vicí chun ailt ghaolmhara
          a bhailiú. Is féidir leat ainm na Catagóire a úsáid chun a chur in iúl don
          Phainéal na hailt go léir sa Chatagóir sin a rianú.
        categories_desc: |-
          Ciallaíonn rianú Catagóire go ndéanfaidh an Painéal eagarthóireachtaí ar aon alt sa Chatagóir sin a chomhaireamh. De réir réamhshocraithe (doimhneacht 0), ní dhéanfar rianú ach ar na hairteagail atá go díreach sa Chatagóir sin.
          Is féidir leat an luach doimhneachta a mhéadú (suas le huasmhéid de 3) más mian leat ailt atá i bhfochatagóirí den Chatagóir sin a áireamh. Bí cinnte go mbrabhsálann tú an Chatagóir ar dtús, lena chinntiú go n-oireann na fochatagóirí don rud atá beartaithe agat a rianú.
        templates: Teimpléid
        templates_short_desc: Is féidir leat ailt a rianú bunaithe ar Theimpléad atá
          iontu, rud a oibríonn cibé acu an úsáidtear an Teimpléad ar an alt féin,
          nó ar an leathanach Plé comhfhreagrach — amhail teimpléid WikiProject.
        petscan: PetScan
        petscan_short_desc: Is uirlis é PetScan a ligeann duit leathanaigh vicí a
          fhiosrú bunaithe ar raon leathan critéar — lena n-áirítear catagóirí, teimpléid,
          naisc vicí, agus i bhfad níos mó. Is féidir leat ID fiosrúcháin PetScan
          a úsáid chun sraith alt a chumrú le rianú ar an bPainéal.
        pagepile: PagePile
        pagepile_short_desc: Is uirlis é PagePile a ligeann duit liosta leathanach
          a chruthú nach n-athraíonn le himeacht ama agus a aithnítear le haitheantas
          uathúil.
        templates_desc: Úsáidtear teimpléid chun réimse leathan cuspóirí ar leathanaigh
          vicí, ach tá cuid acu sainiúil do thopaic. Tá teimpléid nascleanúna, teimpléid
          WikiProject, agus teimpléid Infobox atá sainiúil do thopaic an-úsáideach
          go háirithe agus Teimpléad á úsáid chun Clár Scóip Airteagail a chumrú.
        pagepile_desc: |-
          Is uirlis ar Wikimedia Cloud é PagePile. Ligeann sé d'úsáideoirí grúpa leathanach vicí a bhailiú agus a eagrú i mbeart amháin ar a dtugtar "carn". Is féidir na carn seo a roinnt go héasca le daoine eile ansin, rud a chuireann ar chumas obair chomhoibríoch agus comhroinnt faisnéise.
          I gcodarsnacht le PetScan, ní athróidh na hairteagail i gcarn le himeacht ama, fiú nuair a athraíonn catagóirí, teimpléid nó sonraí eile a úsáideadh chun an tsraith alt sin a chruthú.
        petscan_desc: |-
          Is uirlis chumhachtach ach casta é PetScan chun ceisteanna a chur ar shraith leathanach vicí bunaithe ar réimse leathan critéar agus foinsí sonraí. Is féidir leat PetScan a úsáid go díreach chun an fiosrúchán a chruthú do shraith alt ar mhaith leat a rianú, rud a thugann rochtain duit ar an tsraith iomlán roghanna chun do cheist a spriocdhíriú go beacht. Nó is féidir leat fiosrúchán PetScan a chruthú ó chuid de na roghanna is coitianta go díreach ón Painéal.
          Sábhálann PetScan na paraiméadair fiosrúcháin agus soláthraíonn sé ID don fhiosrúchán sin. Féadfaidh torthaí an fhiosrúcháin sin athrú le himeacht ama, mar shampla nuair a chuirtear ailt nua leis an gcatagóir a chuimsíonn an fiosrúchán. Déanfaidh an Painéal na torthaí fiosrúcháin a athnuachan go tréimhsiúil le haghaidh ID ar leith, agus déanfaidh sé a staitisticí a nuashonrú bunaithe ar an tsraith alt is déanaí a tháirgeann PetScan.
        petscan_create_psid: Cruthaigh ID Scanadh Peataí ag baint úsáide as an uirlis
          oifigiúil Scanadh Peataí
        pagepile_create_id: Cruthaigh PagePile ag baint úsáide as an uirlis oifigiúil
          PagePile
