  suggestions:
    editing: Moltaí Eagarthóireachta
    suggestion_docs:
      fa: Níor cheart go mbeadh gá le haon bhreiseáin bhreise ábhair mura mbíonn faisnéis
        nua ar fáil; is minic a bhíonn feabhsuithe breise ar cháilíocht an phróis
        indéanta.
      a: B’fhéidir go mbeadh gá le saineolas chun an t-alt a choigeartú, agus b’fhéidir
        go mbeadh gá le fadhbanna stíle a réiteach. D’fhéadfadh athbhreithniú piaraí
        cabhrú.
      ga: Is fiú roinnt eagarthóireachta ag saineolaithe ábhair agus stíle; d’fhéadfadh
        comparáid le halt atá ann cheana féin ar ábhar comhchosúil réimsí a léiriú
        ina bhfuil an t-ábhar lag nó in easnamh.
      bplus: D’fhéadfaí feabhas a chur air seo trí ionchur ó shaineolaithe chun measúnú
        a dhéanamh ar na réimsí ina bhfuil easpa clúdach fós, agus trí léaráidí, cúlra
        stairiúil, agus tagairtí breise a úsáid freisin. Smaoinigh ar athbhreithniú
        piaraí nó ainmniúchán a dhéanamh le haghaidh stádas maith alt. Mura bhfuil
        an t-alt vicínithe go hiomlán cheana féin, seo é an t-am.
      b: Caithfear aghaidh a thabhairt ar roinnt gnéithe den ábhar agus den stíl.
        B’fhéidir go mbeadh gá le heolas saineolaithe. Ba chóir ábhair thacaíochta
        a chur san áireamh más féidir, agus an t-alt a sheiceáil le fáil amach an
        bhfuil sé i gcomhréir leis an Lámhleabhar Stíle agus le treoirlínte stíl gaolmhara.
      c: Tá gá le heagarthóireacht shuntasach chun bearnaí san ábhar a dhúnadh agus
        fadhbanna glantacháin a réiteach.
      start: Ba chóir tagairtí d’fhoinsí iontaofa a chur ar fáil ar dtús; tá feabhas
        suntasach ag teastáil freisin ó thaobh ábhair agus eagrúcháin an ailt de.
        Feabhsaigh an gramadach, an litriú, an stíl scríbhneoireachta agus an teanga
        theicniúil chomh maith.
      stub: Is féidir le haon ábhar eagarthóireachta nó breise a bheith ina chuidiú.
        Ba chóir go mbeadh soláthar ábhar bríoch mar thosaíocht. Is é an réiteach
        is fearr chun Airteagal den rang Stum a ardú go hAirteagal den rang Tosaigh
        ná cúiseanna tagartha a chur leis a léiríonn cén fáth go bhfuil an topaic
        suntasach.
      fl: Níor cheart go mbeadh gá le haon bhreiseáin ábhair mura dtiocfaidh faisnéis
        nua ar fáil.
      list: Ba chóir go mbeadh liostaí ina liostaí de naisc bheo chuig ailt Vicipéid,
        agus iad ainmnithe agus eagraithe go cuí.
      future: D’fhéadfadh ábhar a cuireadh leis a bheith ina thuairimíocht agus ba
        chóir é a fhoinsiú go cúramach.
      disambig: Ba chóir breiseanna a dhéanamh de réir mar a chruthaítear ailt nua
        den ainm sin. Tabhair aird ghéar ar ainmniú ceart na leathanach sin, mar is
        minic nach mbíonn gá le "(díbhrí)" a chur leis an teideal.
      '?': Moltaí gan fáil - Níl an t-alt rátáilte nó níl moltaí ar fáil don rátáil.
      does_not_exist: Níl an t-alt seo ar fáil ar Vicipéid.
