# Labeled cases for ClaimVerification::Evaluation::ExtractionEvaluation.
# Each case names an HTML file (MediaWiki parser output, relative to this
# file) and lists the claims and citations a correct extractor should find.
# The claims list is exhaustive: extracted claims not listed here count
# against precision.
- name: third_place_diff
  # Parsed changed-wikitext of the Third_place diff (oldid=1340536495),
  # captured from the action=parse API via the cached VCR cassette.
  html_file: third_place_diff.html
  claims:
    - sentence_includes: privilege certain social groups
      ref_ids: [cite_note-1]
    - sentence_includes: may not be distributed evenly across populations
      ref_ids: [cite_note-2]
  citations:
    - ref_id: cite_note-1
      text_includes: Putnam
    - ref_id: cite_note-2
      text_includes: Zukin
