title: Categories for your institution
summary: ''
content: "Take some time to explore how your institution appears in Wikimedia Commons
  categories.\n\nThere may be no category yet, multiple categories that need merging,
  or a category that needs renaming. If you think a category is titled incorrectly,
  please alert your course instructor so they can work with you to rename it. \n\nTo
  search for specific categories on Wikimedia Commons, add the text below to the search
  bar, replacing the blank with your search word: \n\n“Category:_____”\nNote that
  there is no space after the colon.\n"
