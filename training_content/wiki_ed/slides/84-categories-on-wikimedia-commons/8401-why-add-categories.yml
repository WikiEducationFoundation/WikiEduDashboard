title: Why add categories?
summary: ''
content: "Categories organize images within Wikimedia Commons and make them easier
  to find. Every image should have at least one category, and most will have several.
  Adding categories to your images increases searchability and discoverability and
  helps keep Wikimedia Commons organized. Leaving a file uncategorized creates extra
  work for volunteers, who may have to guess where it belongs if metadata is incomplete.
  \n\nCategories are also the main way to track image views across Wikimedia platforms
  and all Wikipedia language versions. We’ll learn more about this in the next module,
  “Using GLAMorgan to track views”.\n\nAs shown in the image below, you’ll find the
  Category section at the bottom of the media file’s landing page on Commons. [Learn
  more here](https://commons.wikimedia.org/wiki/Commons:Categories)\n<figure class=\"alt-layout-100\">\n
