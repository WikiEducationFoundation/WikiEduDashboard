title: What about subcategories?
summary: ''
content: "Subcategories help organize content within a parent category and prevent
  any single category from becoming too large. You’ll typically find subcategories
  in broad categories to separate topics.\n\nFor example, an institution’s category
  might have subcategories for exhibits, time periods, genres, etc. \n\nExploring
  how existing categories are organized and subcategorized can help guide you.\n\n[Learn
  more](https://commons.wikimedia.org/wiki/Commons:How_to_create_new_categories_or_subcategories)"
