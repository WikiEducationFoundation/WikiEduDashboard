content: "If you enabled the tool “HotCat” in our Wikipedia course, select the (+)
  symbol to search for and add new categories. You can select (-) to delete existing
  categories from an image. \n\n[Learn more about HotCat and how to enable it.](https://commons.wikimedia.org/wiki/Help:Gadget-HotCat)\n<figure
