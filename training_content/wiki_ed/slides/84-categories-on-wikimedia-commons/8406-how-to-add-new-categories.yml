title: How to add new categories
summary: ''
content: "Confident that you should add a new category?\n\nTo add a new category,
  go to the image page and select “Edit.” Then insert the new category using the code
  [[Category:Sample Category]] at the end of the block of source code. Save the edited
  page. \n\nThe new category will now appear as a red link at the bottom of the page
  in the Category section. Click the red link to access the new, empty category page.
  You can now edit the category like any other Wiki page and add images into it. Learn
  more about naming new categories [here.](https://commons.wikimedia.org/wiki/Commons:Categories#How_to_categorize:_guidance_by_topic)\n\n[Additional
  guidance on creating new categories](https://commons.wikimedia.org/wiki/Commons:Categories#Creating_a_new_categoryhttps://commons.wikimedia.org/wiki/Commons:How_to_create_new_categories_or_subcategories)\n"
