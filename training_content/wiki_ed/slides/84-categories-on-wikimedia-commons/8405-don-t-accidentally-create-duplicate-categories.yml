id: 8405
title: Don’t accidentally create duplicate categories!
summary: ''
content: "Category names should be descriptive but concise. Before creating a new
  category, double check that a fitting category doesn’t already exist. Be sure to
  search for it in different ways (with different combinations of key words) before
  you create a new category.\n \nYou might encounter inconsistencies in naming practices,
  for example “National Portrait Gallery, London” vs “National Portrait Gallery (United
  States)” — the category you need might exist but be worded differently from what
  you’re expecting.\n\nRemember, creating duplicate or similarly named categories
  can cause files to be miscategorized! "
