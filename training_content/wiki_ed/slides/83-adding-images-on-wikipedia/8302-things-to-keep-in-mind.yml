title: Things to keep in mind
summary: ''
content: "* Wikipedians are cautious about images; they don’t want to remove or replace
  good quality images in articles without reason. \n\n* Still, feel free to “be bold”:
  if your image is higher  quality or addresses a need in an article, add it or make
  the swap. (Done correctly, adding an image is an improvement Wikipedia editors welcome!)\n\n*
  Have a question about an existing image in a Wikipedia article? It’s always best
  to leave a message on the talk page before replacing an image.\n\n* Don’t overload
  an article with images. Images should be relevant to the topic and proportionate
  to the article’s length. After placing an image in a Wikipedia article, add an appropriate
  caption to connect the image to the article or section topic. \n\n* For well-developed
  articles, especially high quality articles, editors will create a gallery of images,
  for example: https://en.wikipedia.org/wiki/Europe#Major_cities_and_urban_areas\n\n<figure
  class=\"alt-layout-100\">\n  <img src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Gallery_screenshot.png/1280px-Gallery_screenshot.png?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=thumbnail\"
  />\n</figure>\n"
