title: When to replace a lead image
summary: ''
content: "While it’s important to be cautious when replacing a lead image, lead images
  that are clearly of low quality can and should be replaced.\n\nWhy would someone
  add a low-quality image as the lead? It might be the only freely available image
  of the person or topic!\n\nNew images added to Wikimedia Commons aren’t always added
  to Wikipedia articles right away, which can also leave lead images outdated.\n\nThe
  lead images below are good candidates for replacement if a higher-quality, appropriately
  licensed image is available: \n\n<figure class=\"alt-layout-100\">\n  <img src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Lead_photo%2C_Allan_Jaffe.png/1280px-Lead_photo%2C_Allan_Jaffe.png?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=thumbnail\"
  />\n</figure>\n\n<figure class=\"alt-layout-100\">\n  <img src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Lead_image%2C_Vern%27s.png/1280px-Lead_image%2C_Vern%27s.png?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=thumbnail\"
  />\n</figure>\n"
