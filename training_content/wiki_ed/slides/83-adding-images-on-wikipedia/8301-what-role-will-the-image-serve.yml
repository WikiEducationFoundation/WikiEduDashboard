id: 8301
title: What role will the image serve?
summary: ''
content: "Before adding or replacing images in Wikipedia articles, be sure to check
  out Wikipedia’s [Manual of Style](https://en.wikipedia.org/wiki/Wikipedia:Manual_of_Style/Images#).\n\nWhen
  adding images to Wikipedia, it helps to consider the roles images serve in an encyclopedia,
  including: \n\n* Illustrative or representational – showing what something looks
  like (e.g., a type of historical coin)\n* Documentary or evidentiary – acting as
  a primary source or evidence (e.g., a photo of miners during the California Gold
  Rush) \n* Explanatory – diagrams and infographics \n* Comparative – (e.g. two images
  that show a location before and after a notable event)"
