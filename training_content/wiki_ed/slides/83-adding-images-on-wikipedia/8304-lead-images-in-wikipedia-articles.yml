title: Lead images in Wikipedia articles
summary: ''
content: "The image at the very top of an article or within an infobox is called a
  lead image. Only replace a lead image if your image is clearly better quality. \n\nThis
  is especially true for high-quality articles or subjects of significant prominence
  (presidents, countries, etc.), where lead image selection has likely been extensively
  discussed on the article’s talk page. \n\n[Learn more here](https://en.wikipedia.org/wiki/Wikipedia:Manual_of_Style/Images#Images_for_the_lead)\n"
