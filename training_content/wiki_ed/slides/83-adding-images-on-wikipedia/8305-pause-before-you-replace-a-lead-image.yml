title: Pause before you replace a lead image
summary: ''
content: "Below you’ll see an example of a high-quality lead image you would want
  to be cautious of replacing. \n\nThis image is a recent and flattering headshot
  of the individual, is of high quality, and in focus without any pixilation or other
  obstructions.\n \nRemember, a lead image of a person or topic should be relevant
  and somewhat recent. If you have a more recent photo but of lower quality, you could
  consider adding it elsewhere in the body of the article. \n\n<figure class=\"alt-layout-100\">\n
