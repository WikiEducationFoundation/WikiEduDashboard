title: Adding images to Wikipedia articles that don’t have any yet
summary: ''
content: |
  Adding images to a Wikipedia article is straightforward, especially if none exist yet.

  Remember, make sure each image adds value to the article and is placed in context, either through its caption or the section it appears in.

  Avoid adding more images than the article’s length warrants. For a stub class article, one image is usually enough.
