title: What’s a free license?
summary: ''
content: "On Wikipedia, the images you use must have what's called a \"free license\".\n\nAnyone
  who creates a work is automatically the owner of its copyright, unless they produced
  it for an employer, or transferred their copyright to someone else. A free license
  is a kind of copyright license that says the creator will allow anyone to use their
  work (with some, or no, restrictions) without asking for permission.\n\nWikimedia
  Commons — the free media collection that Wikipedia draws from — defaults to what's
  called a \"Creative Commons Attribution Share-Alike\" license (CC BY-SA).\n\nThat
  means that anyone can:\n\n* use it, copy it, share it\n\n* modify it and share it
  as a new work\n\nAs long as the person using it:\n\n* provides credit to the original
  author and notes the license (Attribution)\n\n* releases any modifications of the
  work under the same license (Share-Alike)\n\nFor our course, we will focus on two
  licenses for images: \n\n* PD (Public domain) – out-of-copyright images someone
  else took\n\n* CC BY 4.0 – images that you take yourself"
