title: What’s a CC BY 4.0 license?
summary: ''
content: |
  Uploading your file under the CC BY 4.0 license means you want to get credit for the work, including remixes and modifications, but you enjoy sharing your work with millions of others, as long as the license is respected.

  This license allows others to share, adapt, and even commercially use your work, but they must give appropriate credit to you as the creator.
