title: Tracking image views
summary: ''
content: |
  The “Overview” section shows the total number of images in the category, how many are being used in Wikipedia articles, and the total views for the month for all images in the category.

  For each individual image, you will see its unique view count, which pages it appears on, and the views for each page. You can also click through to see how the image appears on each page.

