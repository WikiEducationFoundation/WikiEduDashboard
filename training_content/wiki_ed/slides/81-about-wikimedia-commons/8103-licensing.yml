id: 8103
title: Licensing
summary: ''
content: "Images that you want to add to Wikipedia articles need to be uploaded to
  Wikimedia Commons first.\n\nEverything you add to Wikimedia Commons must be freely
  usable and released under a specific set of licenses. For our purposes, this means
  either public domain (PD) or CC BY 4.0. \n\nWe’ll go over the specifics on licensing
  and copyright in the next training module, \"Licensing on Wikimedia Commons\"."
