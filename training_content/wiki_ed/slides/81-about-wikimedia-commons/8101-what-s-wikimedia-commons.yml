title: What’s Wikimedia Commons?
summary: ''
content: "Wikipedia is one of the most powerful platforms for distributing images
  to a wide audience. By adding images to relevant Wikipedia articles, you’ll significantly
  broaden your institution’s reach and impact. \n\nWikimedia Commons (often referred
  to simply as “Commons”) is the media repository for the Wikimedia projects. It contains
  over 133 million free-to-use media files, and that number grows daily with each
  new upload! \n\nWikimedia Commons stores the image and media files for the 300+
  different language versions of Wikipedia. Files from Wikimedia Commons can be used
  in Wikipedia articles across all languages."
