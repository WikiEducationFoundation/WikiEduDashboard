title: 'Commons contributors '
summary: ''
content: "Unlike the English language Wikipedia, many people on Commons do not speak
  or communicate in English. Be patient with people, and remember, it might not always
  be obvious when someone has understood only part of what you said. \n\nCommons contributors
  fall into two different categories. The majority of contributors are **content creators**
  and **uploaders**. Photographers are the largest group on Commons — about 90% of
  the files on Commons are photos. The second category is **content curator**. \n\nContributions
  from professionals at cultural institutions are highly welcome on Commons! As long
  as you engage in good faith and follow Commons’ guidelines, you’ll find plenty of
  people ready to help with any bumps along the way."
