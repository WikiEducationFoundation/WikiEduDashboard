title: 'Conflicts of interest: Wikimedia Commons vs. Wikipedia'
summary: ''
content: "Like Wikipedia, Wikimedia Commons has guidelines and policies that govern
  the site and editor behavior. \n\nOne key distinction between the two? The conflict
  of interest threshold differs between Wikimedia Commons and Wikipedia. On Commons,
  you can add images related to your institution or people you may know, but on Wikipedia,
  editing articles about anyone or anything you are closely connected to is not allowed."
